<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rebost</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4B5842">

<meta name="apple-mobile-web-app-title" content="Rebost">

<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap');

:root{
  --bg:#EDEAE2;
  --surface:#F7F5EF;
  --surface-2:#E4E0D3;
  --line:#D6D0BF;
  --ink:#2F2C25;
  --ink-soft:#726D5D;
  --ink-faint:#9C9788;
  --olive:#4B5842;
  --walnut:#7B5B3F;
  --ochre:#AD7C33;
  --brick:#9C4A3D;
  --accent:#2F6B4F;
  --accent-2:#C6862E;
  --accent-hover:#255740;
  --accent-soft:#E3F0EA;
  --radius:5px;
}
:root[data-theme="dark"]{
  --bg:#1E1C18;
  --surface:#28251F;
  --surface-2:#332F27;
  --line:#423D33;
  --ink:#EDEAE2;
  --ink-soft:#B0AA98;
  --ink-faint:#7A7568;
  --brick:#C96F5C;
  --accent-2:#D89A45;
}
html{transition:background-color .15s ease;}
body,#root,.wrap{transition:background-color .15s ease, color .15s ease;}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;}
#root{min-height:100vh;}
button{font-family:inherit;cursor:pointer;transition:background-color .12s ease,border-color .12s ease,color .12s ease,opacity .12s ease;}
input,select{font-family:inherit;}

.wrap{max-width:920px;margin:0 auto;padding:28px 20px 80px;}

.banner{background:var(--brick);color:#F7F5EF;font-size:13px;padding:10px 16px;text-align:center;}
.banner-info{background:var(--accent-2);color:#2F2C25;}
.banner button{background:none;border:1px solid #F7F5EF;color:#F7F5EF;border-radius:4px;padding:3px 9px;font-size:12px;margin-left:10px;}

/* header */
.hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(--line);gap:14px;flex-wrap:wrap;}
.eyebrow{font-size:11px;letter-spacing:.14em;color:var(--ink-faint);text-transform:uppercase;margin:0 0 2px;}
.h-title{font-family:'Fraunces',serif;font-weight:600;font-size:32px;margin:0;}
.person-pill{position:relative;}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);font-size:15px;display:flex;align-items:center;justify-content:center;flex:none;}
.icon-btn:hover{color:var(--ink);border-color:var(--ink-soft);}
.person-btn{display:flex;align-items:center;gap:8px;background:var(--accent-soft);border:1px solid var(--accent);border-radius:20px;padding:6px 12px 6px 8px;font-size:13px;color:var(--ink);}
.dot{width:9px;height:9px;border-radius:50%;flex:none;}
.person-menu{position:absolute;right:0;top:calc(100% + 6px);background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 4px 14px rgba(47,44,37,.1);z-index:20;min-width:140px;overflow:hidden;}
.person-menu button{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;padding:9px 12px;font-size:13px;text-align:left;color:var(--ink);}
.person-menu button:hover{background:var(--surface-2);}

.search{width:100%;border:1px solid var(--line);border-radius:var(--radius);padding:9px 12px;font-size:13px;background:var(--surface);color:var(--ink);margin-bottom:22px;}

/* layout */
.grid{display:grid;grid-template-columns:1fr 300px;gap:34px;align-items:start;}
@media(max-width:760px){.grid{grid-template-columns:1fr;}}

/* category shelf */
.shelf{margin-bottom:30px;}
.shelf-hdr{display:flex;align-items:baseline;justify-content:space-between;border-bottom:2px solid var(--accent);padding-bottom:7px;margin-bottom:2px;}
.shelf-name{font-family:'Fraunces',serif;font-weight:600;font-size:18px;}
.shelf-count{font-size:12px;color:var(--ink-faint);margin-left:8px;font-family:'IBM Plex Mono',monospace;}
.shelf-add{background:none;border:none;font-size:12px;color:var(--ink-soft);border-bottom:1px solid var(--ink-faint);padding:0 0 1px;}
.shelf-add:hover{color:var(--ink);border-color:var(--ink);}

.item-row{display:flex;align-items:center;gap:10px;padding:11px 2px;border-bottom:1px solid var(--line);}
.item-row:hover{background:rgba(47,44,37,.025);cursor:pointer;}
.item-main{flex:1;min-width:0;}
.item-name{font-size:14px;font-weight:500;}
.item-brand{font-weight:400;color:var(--ink-faint);font-size:12px;}
.item-sub{font-size:11px;color:var(--ink-faint);margin-top:2px;}
.item-sub.low{color:var(--brick);}
.item-sub.warn{color:var(--ochre);}
.item-sub.pending{color:var(--accent-2);font-style:italic;}
.is-pending{opacity:.7;}
.qty{font-family:'IBM Plex Mono',monospace;font-size:13px;min-width:70px;text-align:right;}
.stepper{display:flex;align-items:center;gap:0;flex:none;}
.stepper button{width:24px;height:24px;border:1px solid var(--line);background:var(--surface);color:var(--ink);font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;}
.stepper button:first-child{border-radius:4px 0 0 4px;}
.stepper button:last-child{border-radius:0 4px 4px 0;border-left:none;}
.stepper button:hover{background:var(--surface-2);}
.add-list-btn{background:none;border:1px solid var(--line);border-radius:4px;color:var(--ink-soft);font-size:11px;padding:4px 8px;flex:none;white-space:nowrap;}
.add-list-btn:hover{color:var(--ink);border-color:var(--ink);}

.empty{padding:18px 2px;font-size:13px;color:var(--ink-faint);font-style:italic;}

/* sidebar */
.side-block{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:18px;}
.side-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.side-title{font-family:'Fraunces',serif;font-weight:600;font-size:15px;margin:0;color:var(--accent);}
.side-action{background:none;border:none;font-size:11px;color:var(--ink-soft);border-bottom:1px solid var(--ink-faint);padding:0;}
.side-action:hover{color:var(--ink);border-color:var(--ink);}
.side-empty{font-size:12px;color:var(--ink-faint);font-style:italic;}
.buy-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;}
.buy-row:last-child{border-bottom:none;}
.buy-name{cursor:pointer;display:flex;flex-direction:column;line-height:1.35;}
.buy-store{font-size:11px;color:var(--ink-faint);font-weight:400;}
.suggest-tag{display:inline-block;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--brick);margin-top:2px;}
.suggest-tag.ai{color:var(--accent-2);}
.buy-name:hover{text-decoration:underline;}
.buy-tag{font-size:10px;font-family:'IBM Plex Mono',monospace;color:var(--brick);white-space:nowrap;}
.buy-tag.warn{color:var(--ochre);}
.extra-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;}
.extra-x{background:none;border:none;color:var(--ink-faint);font-size:13px;padding:0 4px;}
.extra-x:hover{color:var(--brick);}
.extra-form{display:flex;gap:6px;margin-top:8px;}
.extra-form input{flex:1;border:1px solid var(--line);border-radius:4px;padding:6px 8px;font-size:13px;background:var(--bg);}
.extra-form button{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:4px;padding:6px 10px;font-size:12px;}
.activity-row{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--line);font-size:12px;}
.activity-row:last-child{border-bottom:none;}
.activity-text{flex:1;color:var(--ink-soft);line-height:1.4;}
.activity-text b{color:var(--ink);font-weight:500;}
.activity-time{color:var(--ink-faint);font-size:10px;white-space:nowrap;font-family:'IBM Plex Mono',monospace;}
.shortcut-chips{display:flex;flex-wrap:wrap;gap:6px;margin:12px 0;}
.chip{background:var(--surface-2);border:1px solid var(--line);border-radius:16px;padding:6px 12px;font-size:12px;color:var(--ink);position:relative;}
.chip:hover{border-color:var(--ink);}
.chip-x{background:var(--brick);color:#fff;border:none;border-radius:50%;width:15px;height:15px;font-size:9px;line-height:1;margin-left:6px;display:inline-flex;align-items:center;justify-content:center;}
.manage-link{font-size:11px;color:var(--ink-faint);border:none;background:none;text-decoration:underline;padding:0;margin-bottom:4px;}

/* modal */
.overlay{position:fixed;inset:0;background:rgba(47,44,37,.35);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;animation:fadeIn .15s ease;}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes modalIn{from{opacity:0;transform:translateY(6px) scale(.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.modal{background:var(--surface);border-radius:var(--radius);padding:22px;width:100%;max-width:360px;max-height:88vh;overflow-y:auto;animation:modalIn .18s ease;}
.field textarea{width:100%;border:1px solid var(--line);border-radius:4px;padding:8px 9px;font-size:14px;background:var(--bg);color:var(--ink);font-family:inherit;resize:vertical;}
.expiry-type-row{display:flex;gap:8px;}
.radio-pill{display:flex;align-items:center;gap:6px;border:1px solid var(--line);border-radius:16px;padding:6px 12px;font-size:12.5px;color:var(--ink-soft);flex:1;justify-content:center;cursor:pointer;}
.radio-pill input{width:auto;margin:0;}
.radio-pill:has(input:checked){border-color:var(--accent);color:var(--ink);background:var(--accent-soft);}
.modal h3{font-family:'Fraunces',serif;font-size:18px;margin:0 0 16px;}
.field{margin-bottom:12px;}
.field label{display:block;font-size:11px;color:var(--ink-soft);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em;}
.field input,.field select{width:100%;border:1px solid var(--line);border-radius:4px;padding:8px 9px;font-size:14px;background:var(--bg);color:var(--ink);}
.field-row{display:flex;gap:10px;}
.field-row .field{flex:1;}
.barcode-row{display:flex;gap:6px;}
.barcode-row input{flex:1;}
.scan-btn{border:1px solid var(--line);background:var(--surface-2);color:var(--ink);border-radius:4px;padding:0 10px;font-size:12px;white-space:nowrap;}
.scan-btn:hover{background:var(--line);}
.modal-actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px;}
.btn-primary{background:var(--accent);color:#fff;border:1px solid var(--accent);border-radius:4px;padding:9px 16px;font-size:13px;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-ghost{background:none;border:none;color:var(--ink-soft);font-size:13px;}
.btn-ghost:hover{color:var(--ink);}
.btn-delete{background:none;border:none;color:var(--brick);font-size:12px;}
.btn-delete:hover{text-decoration:underline;}

/* scanner */
.scan-video{width:100%;border-radius:4px;background:#111;aspect-ratio:4/3;object-fit:cover;}
.scan-hint{font-size:12px;color:var(--ink-soft);margin-top:10px;}

/* person picker */
.picker{min-height:100vh;display:flex;align-items:center;justify-content:center;}
.picker-card{text-align:center;max-width:300px;}
.picker-card .h-title{margin-bottom:6px;}
.picker-sub{font-size:13px;color:var(--ink-soft);margin-bottom:22px;}
.picker-list{display:flex;flex-direction:column;gap:8px;}
.picker-list button{display:flex;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;font-size:14px;color:var(--ink);}
.picker-list button:hover{background:var(--surface-2);}

.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--ink-faint);}

.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--surface);font-size:13px;padding:10px 18px;border-radius:20px;z-index:60;}

.admin-section-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);margin:0 0 10px;}
.admin-person-row{border-bottom:1px solid var(--line);padding:10px 0;}
.admin-person-row:last-of-type{border-bottom:none;}
.admin-name-input{flex:1;border:1px solid var(--line);border-radius:4px;padding:5px 8px;font-size:13px;background:var(--bg);color:var(--ink);}
.admin-add-row{display:flex;gap:8px;align-items:center;margin-top:10px;}
.admin-add-row input{flex:1;border:1px solid var(--line);border-radius:4px;padding:8px 10px;font-size:13px;background:var(--bg);color:var(--ink);}
.slider-panel{margin-top:12px;padding:12px;background:var(--bg);border-radius:6px;}
.slider-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.slider-row label{width:80px;font-size:11.5px;color:var(--ink-soft);flex:none;}
.slider{-webkit-appearance:none;appearance:none;flex:1;height:6px;border-radius:3px;background:var(--line);outline:none;}
.slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--surface);border:2px solid var(--ink);cursor:pointer;}
.slider::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--surface);border:2px solid var(--ink);cursor:pointer;}
.slider-hue{background:linear-gradient(90deg,#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00);}

.fab{position:fixed;bottom:22px;right:22px;background:var(--accent);color:#fff;border:none;border-radius:24px;padding:13px 20px;font-size:13px;font-weight:500;box-shadow:0 4px 14px rgba(47,44,37,.25);z-index:40;display:flex;align-items:center;gap:7px;}
.fab:hover{background:var(--accent-hover);}
.fab-icon{font-size:16px;line-height:1;}
.quick-modal{max-width:320px;}
.quick-modal input{width:100%;border:1px solid var(--line);border-radius:4px;padding:10px 12px;font-size:15px;background:var(--bg);color:var(--ink);}
</style>

<script>

const CATS = ['Nevera','Congelador','Rebost','Farmaciola i casa'];
const DEFAULT_ACCENT = '#2F6B4F';
const EXPIRY_WARN_DAYS = 5;
const ADMIN_PASSWORD = 'guillem';

let DATA = {items:[], extras:[], activity:[], shortcuts:[], people:[]};
let BARCODES = {};
let ME = null;
let theme = 'light';
let modalOpen = false;
let modalDraft = null;
let modalEditId = null;
let personMenuOpen = false;
let searchTerm = '';
let scannerOpen = false;
let quickAddOpen = false;

let toastTimer = null;

let confirmState = null; // {message, onConfirm}

let moveFromExtraId = null;
let pendingQueue = [];
let aiSuggestions = [];
let dismissedAI = [];
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,9);

const root = document.getElementById('root');
const esc = (s) => String(s==null?'':s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const personColor = (name) => (DATA.people.find(p=>p.name===name)||{}).color || DEFAULT_ACCENT;

function shade(hex, amt){
  const n = hex.replace('#','');
  const r = Math.max(0, Math.min(255, parseInt(n.substring(0,2),16) + amt));
  const g = Math.max(0, Math.min(255, parseInt(n.substring(2,4),16) + amt));
  const b = Math.max(0, Math.min(255, parseInt(n.substring(4,6),16) + amt));
  return '#' + [r,g,b].map(v => Math.round(v).toString(16).padStart(2,'0')).join('');
}
function hexToHsl(hex){
  const n = hex.replace('#','');
  let r = parseInt(n.substring(0,2),16)/255, g = parseInt(n.substring(2,4),16)/255, b = parseInt(n.substring(4,6),16)/255;
  const max = Math.max(r,g,b), min = Math.min(r,g,b);
  let h, s, l = (max+min)/2;
  if(max === min){ h = s = 0; }
  else{
    const d = max-min;
    s = l > 0.5 ? d/(2-max-min) : d/(max+min);
    switch(max){
      case r: h = (g-b)/d + (g<b?6:0); break;
      case g: h = (b-r)/d + 2; break;
      default: h = (r-g)/d + 4;
    }
    h *= 60;
  }
  return {h: Math.round(h), s: Math.round(s*100), l: Math.round(l*100)};
}
function hslToHex(h, s, l){
  s /= 100; l /= 100;
  const c = (1-Math.abs(2*l-1))*s, x = c*(1-Math.abs((h/60)%2-1)), m = l-c/2;
  let r,g,b;
  if(h<60){r=c;g=x;b=0;} else if(h<120){r=x;g=c;b=0;} else if(h<180){r=0;g=c;b=x;}
  else if(h<240){r=0;g=x;b=c;} else if(h<300){r=x;g=0;b=c;} else {r=c;g=0;b=x;}
  const toHex = v => Math.round((v+m)*255).toString(16).padStart(2,'0');
  return '#' + toHex(r) + toHex(g) + toHex(b);
}
function applyPersonTheme(){
  const hex = personColor(ME) || DEFAULT_ACCENT;
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-hover', shade(hex, theme==='dark' ? 26 : -22));
  document.documentElement.style.setProperty('--accent-soft', shade(hex, theme==='dark' ? -125 : 150));
}
function applyTheme(){
  document.documentElement.setAttribute('data-theme', theme);
  applyPersonTheme();
}
function loadTheme(){
  try{ return localStorage.getItem('rebost-theme') || 'light'; }catch(e){ return 'light'; }
}
function saveTheme(t){
  try{ localStorage.setItem('rebost-theme', t); }catch(e){}
}
function toggleTheme(){
  theme = theme === 'dark' ? 'light' : 'dark';
  saveTheme(theme);
  applyTheme();
  render();
}

/* ---------- persistence ---------- */


function loadPerson(){
  try{ return localStorage.getItem('rebost-me'); }catch(e){ return null; }
}
function savePerson(name){
  try{ localStorage.setItem('rebost-me', name); }catch(e){}
}

async function loadData(){
  const [{data: items, error: e1}, {data: extras, error: e2}, {data: barcodes}, {data: activity}, {data: shortcuts}, {data: people}] = await Promise.all([
    sb.from('items').select('*').order('name'),
    sb.from('extras').select('*').order('created_at'),
    sb.from('barcodes').select('*'),
    sb.from('activity').select('*').order('created_at', {ascending:false}).limit(15),
    sb.from('shortcuts').select('*').order('name'),
    sb.from('people').select('*').order('sort_order')
  ]);
  if(e1 || e2) throw (e1 || e2);
  DATA.items = items || [];
  DATA.extras = extras || [];
  DATA.activity = activity || [];
  DATA.shortcuts = shortcuts || [];
  DATA.people = people || [];
  BARCODES = {};
  (barcodes||[]).forEach(b => BARCODES[b.barcode] = b);
  saveLocalCache();
}
async function logActivity(action, detail){
  try{ await sb.from('activity').insert({actor: ME, action, detail}); }catch(e){}
}
function saveLocalCache(){
  try{ localStorage.setItem('rebost-cache', JSON.stringify(DATA)); }catch(e){}
}
function loadLocalCache(){
  try{ const v = localStorage.getItem('rebost-cache'); return v ? JSON.parse(v) : null; }catch(e){ return null; }
}
function loadQueue(){
  try{ return JSON.parse(localStorage.getItem('rebost-queue') || '[]'); }catch(e){ return []; }
}
function saveQueue(){
  try{ localStorage.setItem('rebost-queue', JSON.stringify(pendingQueue)); }catch(e){}
}

function loadAICache(){
  try{
    const raw = localStorage.getItem('rebost-ai-suggestions');
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    const today = new Date().toISOString().slice(0,10);
    return parsed.date === today ? parsed.items : null;
  }catch(e){ return null; }
}
function saveAICache(items){
  try{ localStorage.setItem('rebost-ai-suggestions', JSON.stringify({date: new Date().toISOString().slice(0,10), items})); }catch(e){}
}

/* ---------- offline queue ---------- */

async function tryOrQueue(table, op, data, match, localId){
  try{
    let q = sb.from(table);
    let r;
    if(op === 'insert') r = await q.insert(data);
    else if(op === 'update') r = await q.update(data).match(match);
    else if(op === 'delete') r = await q.delete().match(match);
    if(r.error) throw r.error;
    connError = false;
    return {ok:true};
  }catch(e){
    pendingQueue.push({id: uid(), table, op, data, match, localId, createdAt: Date.now()});
    saveQueue();
    return {ok:false};
  }
}
function cancelQueuedInsert(localId){
  pendingQueue = pendingQueue.filter(q => q.localId !== localId);
  saveQueue();
}
async function flushQueue(){
  if(pendingQueue.length === 0 || !navigator.onLine) return;
  while(pendingQueue.length > 0){
    const item = pendingQueue[0];
    try{
      let q = sb.from(item.table);
      let r;
      if(item.op === 'insert') r = await q.insert(item.data);
      else if(item.op === 'update') r = await q.update(item.data).match(item.match);
      else if(item.op === 'delete') r = await q.delete().match(item.match);
      if(r.error) throw r.error;
      pendingQueue.shift();
      saveQueue();
    }catch(e){ break; }
  }
  try{ await loadData(); connError = false; }catch(e){}
  render();
}

function subscribeRealtime(){
  sb.channel('rebost-live')
    .on('postgres_changes', {event:'*', schema:'public', table:'items'}, () => reloadQuietDebounced())
    .on('postgres_changes', {event:'*', schema:'public', table:'extras'}, () => reloadQuietDebounced())
    .on('postgres_changes', {event:'*', schema:'public', table:'activity'}, () => reloadQuietDebounced())
    .on('postgres_changes', {event:'*', schema:'public', table:'shortcuts'}, () => reloadQuietDebounced())
    .on('postgres_changes', {event:'*', schema:'public', table:'people'}, () => reloadQuietDebounced())
    .subscribe();
}
let reloadTimer = null;
function reloadQuietDebounced(){
  clearTimeout(reloadTimer);
  reloadTimer = setTimeout(reloadQuiet, 250);
}

/* ---------- mutations ---------- */

async function saveItem(fields, existingId){
  const payload = {...fields, updated_by: ME, updated_at: new Date().toISOString()};
  const localId = existingId || uid();
  if(existingId){
    const it = DATA.items.find(i=>i.id===existingId);
    if(it) Object.assign(it, payload);
  }else{
    DATA.items.push({id: localId, ...payload, _pending:true});
  }
  render();
  const res = existingId
    ? await tryOrQueue('items', 'update', payload, {id: existingId})
    : await tryOrQueue('items', 'insert', payload, null, localId);
  if(res.ok){
    logActivity(existingId ? 'edita' : 'afegeix article', existingId ? `${fields.name} (${fields.quantity}${fields.unit||''})` : fields.name);
    if(fields.barcode){
      try{ await sb.from('barcodes').upsert({barcode: fields.barcode, name: fields.name, category: fields.category, unit: fields.unit}); }catch(e){}
    }
    await loadData();
  }else{
    showToast('Sense connexió: es desarà quan torni internet.');
  }
  render();
}
async function deleteItem(id){
  const it = DATA.items.find(i=>i.id===id);
  if(it && it._pending){ cancelQueuedInsert(id); DATA.items = DATA.items.filter(i=>i.id!==id); render(); return; }
  DATA.items = DATA.items.filter(i=>i.id!==id);
  render();
  const res = await tryOrQueue('items', 'delete', null, {id});
  if(res.ok){ if(it) logActivity('elimina', it.name); await loadData(); }
  else{ showToast('Sense connexió: s\'eliminarà quan torni internet.'); }
  render();
}
async function stepQty(id, delta){
  const it = DATA.items.find(i=>i.id===id);
  if(!it) return;
  const newQty = Math.max(0, Math.round((it.quantity + delta) * 100) / 100);
  it.quantity = newQty; render(); // optimistic
  if(it._pending){
    const queued = pendingQueue.find(q => q.localId === id);
    if(queued){ queued.data.quantity = newQty; saveQueue(); }
    return;
  }
  const payload = {quantity:newQty, updated_by:ME, updated_at:new Date().toISOString()};
  const res = await tryOrQueue('items', 'update', payload, {id});
  if(res.ok) logActivity(delta > 0 ? 'suma' : 'resta', `${it.name} → ${newQty}${it.unit||''}`);
  render();
}
async function reconcileQty(id, addAmount){
  const it = DATA.items.find(i=>i.id===id);
  if(!it) return;
  const newQty = Math.round((it.quantity + addAmount) * 100) / 100;
  it.quantity = newQty; render();
  const payload = {quantity:newQty, updated_by:ME, updated_at:new Date().toISOString()};
  const res = await tryOrQueue('items', 'update', payload, {id});
  if(res.ok){
    logActivity('compra reposada', `${it.name} +${addAmount}${it.unit||''} → ${newQty}${it.unit||''}`);
    const matching = DATA.extras.filter(e => e.name.toLowerCase() === it.name.toLowerCase());
    for(const ex of matching){ await removeExtraPlain(ex.id); }
    await loadData();
  }else{
    showToast('Sense connexió: es sincronitzarà després.');
  }
  render();
}
async function addExtra(name){
  if(!name.trim()) return;
  const localId = uid();
  DATA.extras.push({id: localId, name: name.trim(), added_by: ME, created_at: new Date().toISOString(), _pending:true});
  render();
  const res = await tryOrQueue('extras', 'insert', {name:name.trim(), added_by:ME}, null, localId);
  if(res.ok){ logActivity('afegeix a la llista', name.trim()); await loadData(); }
  else{ showToast('Sense connexió: s\'afegirà quan torni internet.'); }
  render();
}
async function removeExtraPlain(id){
  const ex = DATA.extras.find(e=>e.id===id);
  if(ex && ex._pending){ cancelQueuedInsert(id); DATA.extras = DATA.extras.filter(e=>e.id!==id); render(); return; }
  DATA.extras = DATA.extras.filter(e=>e.id!==id);
  render();
  const res = await tryOrQueue('extras', 'delete', null, {id});
  if(res.ok){ if(ex) logActivity('comprat', ex.name); await loadData(); }
  else{ showToast('Sense connexió: es sincronitzarà després.'); }
  render();
}
async function aiFindMatch(name){
  try{
    const known = DATA.items.map(i => i.name);
    if(known.length === 0) return null;
    const prompt = `Tinc aquest producte a la llista de la compra: "${name}". Aquests són els articles que ja tinc a l'inventari: ${JSON.stringify(known)}.
Si "${name}" es refereix quasi segur al mateix producte real que un d'aquests (no només similar — han de ser intercanviables de veritat), respon NOMÉS amb el nom exacte tal com surt a la llista.
Si no n'hi ha cap que sigui clarament el mateix producte (per exemple "Aigua" i "Aigua mineral" NO són el mateix producte), respon NOMÉS amb la paraula CAP.`;
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 60, messages: [{role:'user', content:prompt}] })
    });
    const data = await res.json();
    const text = (data.content || []).map(b => b.text || '').join('').trim();
    if(!text || text.toUpperCase().includes('CAP')) return null;
    const clean = text.replace(/["'.]/g,'').trim();
    return known.find(n => n.toLowerCase() === clean.toLowerCase()) || null;
  }catch(e){ return null; }
}
async function removeExtra(id){
  const ex = DATA.extras.find(e=>e.id===id);
  if(!ex) return;
  const exact = DATA.items.find(i => i.name.toLowerCase() === ex.name.toLowerCase());
  if(exact){ reconcileItem = exact.id; render(); return; }

  const guessName = await aiFindMatch(ex.name);
  if(guessName){
    const guessed = DATA.items.find(i => i.name.toLowerCase() === guessName.toLowerCase());
    if(guessed){
      askConfirm(`"${ex.name}" i "${guessed.name}" semblen el mateix producte. Vols actualitzar l'estoc de "${guessed.name}" en comptes de treure'l sense més?`, () => { reconcileItem = guessed.id; render(); }, 'Sí, actualitza', 'var(--accent)');
      return;
    }
  }
  removeExtraPlain(id);
}

/* ---------- helpers ---------- */

function daysUntil(dateStr){
  if(!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  return Math.round((d - today) / 86400000);
}
function addDays(dateStr, days){
  const d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0,10);
}
function effectiveExpiry(item){
  const dates = [];
  if(item.expiry_date) dates.push(item.expiry_date);
  if(item.opened_date && item.shelf_life_days) dates.push(addDays(item.opened_date, item.shelf_life_days));
  if(dates.length === 0) return null;
  return dates.sort()[0];
}
function expiryLabel(days, type){
  const verb = type === 'consum_preferent' ? 'consum pref.' : 'caduca';
  if(days < 0) return type==='consum_preferent' ? `consum pref. fa ${Math.abs(days)}d` : `caducat fa ${Math.abs(days)}d`;
  if(days === 0) return `${verb} avui`;
  if(days === 1) return type==='consum_preferent' ? 'consum pref. demà' : 'caduca demà';
  return `${verb} en ${days}d`;
}
function timeAgo(ts){
  if(!ts) return '';
  const mins = Math.floor((Date.now()-new Date(ts).getTime())/60000);
  if(mins < 1) return 'ara mateix';
  if(mins < 60) return `fa ${mins} min`;
  const hrs = Math.floor(mins/60);
  if(hrs < 24) return `fa ${hrs} h`;
  const days = Math.floor(hrs/24);
  if(days < 7) return `fa ${days} d`;
  return new Date(ts).toLocaleDateString('ca-ES', {day:'numeric', month:'short'});
}
function showToast(msg){
  toastMsg = msg; render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ toastMsg = null; render(); }, 2200);
}
function askConfirm(message, onConfirm, okLabel, okColor){

}
function exportList(){
  const low = DATA.items.filter(i => i.min_threshold > 0 && i.quantity <= i.min_threshold);
  const lines = ['Llista de la compra'];
  if(low.length){
    lines.push('');
    low.forEach(i => lines.push(`- ${i.name} (${i.quantity}${i.unit||''}, mín ${i.min_threshold})`));
  }
  if(DATA.extras.length){
    lines.push('');
    DATA.extras.forEach(e => lines.push(`- ${e.name}`));
  }
  if(low.length===0 && DATA.extras.length===0){ showToast('No hi ha res a la llista.'); return; }
  const text = lines.join('\n');
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>showToast('Copiat. Ja ho pots enganxar.')).catch(()=>showToast('No s\'ha pogut copiar.'));
  }else{
    showToast('No s\'ha pogut copiar.');
  }
}

    ${adminScreen === 'password' ? renderAdminPassword() : ''}
    ${adminScreen === 'panel' ? renderAdminPanel() : ''}
    ${confirmState ? renderConfirm() : ''}
    ${duplicateState ? renderDuplicate() : ''}
    ${quickAddOpen ? renderQuickAdd() : ''}
    ${!modalOpen && !scannerOpen && !quickAddOpen && !reconcileItem && !adminScreen ? `<button class="fab" id="fabBtn"><span class="fab-icon">+</span>Apunta per comprar</button>` : ''}
    ${toastMsg ? `<div class="toast">${esc(toastMsg)}</div>` : ''}
  `;

  bindEvents();
  restoreSearchFocus();
  if(scannerOpen) startCamera();
  if(quickAddOpen){
    const qi = document.getElementById('quickAddInput');
    if(qi) qi.focus();
  }
}

function renderShelf(cat, term){
  let items = DATA.items.filter(i => i.category === cat);
  if(term) items = items.filter(i => i.name.toLowerCase().includes(term));
  items = items.sort((a,b)=>a.name.localeCompare(b.name,'ca'));
  return `
    <div class="shelf">
      <div class="shelf-hdr">
        <span><span class="shelf-name">${cat}</span><span class="shelf-count">${items.length}</span></span>
        <button class="shelf-add" data-newcat="${cat}">+ Afegeix</button>
      </div>
      ${items.length === 0
        ? `<div class="empty">${term ? 'Cap resultat aquí.' : 'Res per aquí encara.'}</div>`
        : items.map(i => renderItemRow(i)).join('')}
    </div>
  `;
}

function renderItemRow(i){
  const low = i.min_threshold > 0 && i.quantity <= i.min_threshold;
  const eff = effectiveExpiry(i);
  const days = eff ? daysUntil(eff) : null;
  const expiringSoon = days !== null && days <= EXPIRY_WARN_DAYS;

  let subLine, subClass = '';
  if(i._pending){ subLine = 'pendent de sincronitzar…'; subClass = 'pending'; }
  else if(low){ subLine = `per sota del mínim (${i.min_threshold})`; subClass = 'low'; }
  else if(expiringSoon){ subLine = expiryLabel(days, i.expiry_type); subClass = days < 0 ? 'low' : 'warn'; }
  else { subLine = `${esc(i.updated_by||'')} · ${timeAgo(i.updated_at)}`; }

  const nameLine = i.brand ? `${esc(i.name)} <span class="item-brand">${esc(i.brand)}</span>` : esc(i.name);

  return `
    <div class="item-row ${i._pending?'is-pending':''}" data-edit="${i.id}">
      <span class="dot" style="background:${personColor(i.updated_by)}" title="${esc(i.updated_by||'')}"></span>
      <div class="item-main">
        <div class="item-name">${nameLine}</div>
        <div class="item-sub ${subClass}">${subLine}</div>
      </div>
      <div class="qty">${i.quantity}${esc(i.unit||'')}</div>
      <button class="add-list-btn" data-addtolist="${esc(i.name)}" title="Afegeix a la llista de la compra">+ llista</button>
      <div class="stepper">
        <button data-step="${i.id}" data-delta="-1" aria-label="Treu una unitat">–</button>
        <button data-step="${i.id}" data-delta="1" aria-label="Afegeix una unitat">+</button>
      </div>
    </div>
  `;
}

/* ---------- scanning ---------- */

let zxingReader = null;
function getReader(){
  if(!zxingReader){
    const hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.CODE_128
    ]);
    zxingReader = new ZXing.BrowserMultiFormatReader(hints);
  }
  return zxingReader;
}
function openScanner(){ scannerOpen = true; render(); }
function closeScanner(){
  try{ getReader().reset(); }catch(e){}
  scannerOpen = false; render();
}
async function startCamera(){
  const video = document.getElementById('scanVideo');
  const hint = document.getElementById('scanHint');
  if(!video || typeof ZXing === 'undefined') return;
  const reader = getReader();
  try{
    await reader.decodeFromConstraints(
      { video: { facingMode: {ideal:'environment'} } },
      video,
      (result, err) => { if(result) applyScannedCode(result.getText()); }
    );
  }catch(e){
    if(hint) hint.textContent = 'No hi ha accés a la càmera aquí. Escriu el codi a sota.';
  }
}
function applyScannedCode(code){
  try{ getReader().reset(); }catch(e){}
  scannerOpen = false;
  modalDraft.barcode = code;
  const cached = BARCODES[code];
  if(cached){
    if(!modalDraft.name) modalDraft.name = cached.name || '';
    if(cached.category) modalDraft.category = cached.category;
    if(!modalDraft.unit && cached.unit) modalDraft.unit = cached.unit;
  }
  render();
}

function restoreSearchFocus(){
  const el = document.getElementById('searchInput');
  if(el && document.activeElement !== el && el.dataset.wasFocused){
    el.focus();
    el.setSelectionRange(el.value.length, el.value.length);
  }
}

function bindEvents(){
  const personBtn = document.getElementById('personBtn');
  const retryBtn = document.getElementById('retryBtn');
  if(retryBtn) retryBtn.onclick = reloadQuiet;
  const themeBtn = document.getElementById('themeBtn');

  if(personBtn) personBtn.onclick = () => { personMenuOpen = !personMenuOpen; render(); };
  root.querySelectorAll('[data-person]').forEach(b => {

  const searchInput = document.getElementById('searchInput');

      e.target.dataset.wasFocused = '1';
      render();
    };
  }

  root.querySelectorAll('[data-newcat]').forEach(b => {
    b.onclick = () => {
      modalDraft = {name:'', category:b.dataset.newcat, quantity:1, unit:'', minThreshold:0, expiryDate:'', barcode:'', brand:'', store:'', notes:'', openedDate:'', shelfLifeDays:'', expiryType:'caducitat'};
      modalEditId = null; modalOpen = true; render();
    };
  });
  root.querySelectorAll('[data-edit]').forEach(el => {
    el.onclick = (e) => {
      if(e.target.closest('.stepper')) return;
      const id = el.dataset.edit;
      const it = DATA.items.find(i=>i.id===id);
      if(it){
        modalDraft = {name:it.name, category:it.category, quantity:it.quantity, unit:it.unit||'', minThreshold:it.min_threshold, expiryDate:it.expiry_date||'', barcode:it.barcode||'', brand:it.brand||'', store:it.store||'', notes:it.notes||'', openedDate:it.opened_date||'', shelfLifeDays:it.shelf_life_days||'', expiryType:it.expiry_type||'caducitat'};
        modalEditId = id; modalOpen = true; render();
      }
    };
  });
  root.querySelectorAll('[data-step]').forEach(b => {
    b.onclick = (e) => { e.stopPropagation(); stepQty(b.dataset.step, parseFloat(b.dataset.delta)); };
  });
  root.querySelectorAll('[data-addtolist]').forEach(b => {
    b.onclick = (e) => {
      e.stopPropagation();
      const name = b.dataset.addtolist;
      const already = DATA.extras.some(x => x.name.toLowerCase() === name.toLowerCase());
      if(already){ showToast('Ja hi és, a la llista.'); return; }
      addExtra(name);
      showToast('Afegit a la llista.');
    };
  });
  root.querySelectorAll('[data-rmextra]').forEach(b => {
    b.onclick = () => removeExtra(b.dataset.rmextra);
  });
  root.querySelectorAll('[data-movetostock]').forEach(b => {
    b.onclick = () => {
      const extraId = b.dataset.movetostock;
      const ex = DATA.extras.find(e => e.id === extraId);
      if(!ex) return;
      modalDraft = {name: ex.name, category: CATS[0], quantity: 1, unit: '', minThreshold: 0, expiryDate: '', barcode: '', brand: '', store: '', notes: '', openedDate: '', shelfLifeDays: '', expiryType: 'caducitat'};
      modalEditId = null;
      moveFromExtraId = extraId;
      modalOpen = true;
      render();
    };
  });

  const exportBtn = document.getElementById('exportBtn');
  if(exportBtn) exportBtn.onclick = exportList;
  const refreshAiBtn = document.getElementById('refreshAiBtn');
  if(refreshAiBtn) refreshAiBtn.onclick = () => { showToast('Actualitzant suggeriments…'); fetchAISuggestions(); };
  root.querySelectorAll('[data-dismissai]').forEach(b => {
    b.onclick = () => { dismissedAI.push(b.dataset.dismissai.toLowerCase()); render(); };
  });

  const fabBtn = document.getElementById('fabBtn');
  if(fabBtn) fabBtn.onclick = () => { quickAddOpen = true; render(); };

  const quickOverlay = document.getElementById('quickOverlay');
  if(quickOverlay) quickOverlay.onclick = (e) => { if(e.target.id === 'quickOverlay'){ quickAddOpen = false; manageShortcuts = false; render(); } };

  });

  });
  const reconcileOverlay = document.getElementById('reconcileOverlay');

  if(reconcileCancelBtn) reconcileCancelBtn.onclick = () => { reconcileItem = null; render(); };
  const reconcileForm = document.getElementById('reconcileForm');

    reconcileItem = null;
    if(amount > 0) reconcileQty(id, amount); else render();
  };

  const extraForm = document.getElementById('extraForm');
  if(extraForm) extraForm.onsubmit = (e) => {
    e.preventDefault();
    const input = document.getElementById('extraInput');
    addExtra(input.value);
  };

  const overlay = document.getElementById('overlay');
  if(overlay) overlay.onclick = (e) => { if(e.target.id === 'overlay'){ closeModal(); } };
  const cancelBtn = document.getElementById('cancelBtn');
  if(cancelBtn) cancelBtn.onclick = closeModal;
  const deleteBtn = document.getElementById('deleteBtn');
  if(deleteBtn) deleteBtn.onclick = () => {
    const id = modalEditId, name = modalDraft.name;
    closeModal();
    askConfirm(`Segur que vols eliminar "${name}"?`, () => deleteItem(id));
  };

  ['f-name','f-cat','f-qty','f-unit','f-min','f-expiry','f-barcode','f-brand','f-store','f-notes','f-opened','f-shelflife'].forEach(id => {
    const el = document.getElementById(id);
    if(!el) return;
    const handler = (e) => {
      if(id==='f-name') modalDraft.name = e.target.value;
      else if(id==='f-cat') modalDraft.category = e.target.value;
      else if(id==='f-qty') modalDraft.quantity = parseFloat(e.target.value) || 0;
      else if(id==='f-unit') modalDraft.unit = e.target.value;
      else if(id==='f-min') modalDraft.minThreshold = parseFloat(e.target.value) || 0;
      else if(id==='f-expiry') modalDraft.expiryDate = e.target.value;
      else if(id==='f-barcode') modalDraft.barcode = e.target.value;
      else if(id==='f-brand') modalDraft.brand = e.target.value;
      else if(id==='f-store') modalDraft.store = e.target.value;
      else if(id==='f-notes') modalDraft.notes = e.target.value;
      else if(id==='f-opened') modalDraft.openedDate = e.target.value;
      else if(id==='f-shelflife') modalDraft.shelfLifeDays = e.target.value;
    };
    el.addEventListener('input', handler);
    el.addEventListener('change', handler);
  });
  root.querySelectorAll('input[name="expiryType"]').forEach(el => {
    el.addEventListener('change', (e) => { modalDraft.expiryType = e.target.value; });
  });

  const scanBtn = document.getElementById('scanBtn');
  if(scanBtn) scanBtn.onclick = openScanner;

  const itemForm = document.getElementById('itemForm');
  if(itemForm) itemForm.onsubmit = (e) => {
    e.preventDefault();
    if(!modalDraft.name.trim()) return;
    const fields = {
      name: modalDraft.name.trim(),
      category: modalDraft.category,
      quantity: modalDraft.quantity,
      unit: modalDraft.unit.trim(),
      min_threshold: modalDraft.minThreshold,
      expiry_date: modalDraft.expiryDate || null,
      barcode: modalDraft.barcode.trim() || null,
      brand: modalDraft.brand.trim() || null,
      store: modalDraft.store.trim() || null,
      notes: modalDraft.notes.trim() || null,
      opened_date: modalDraft.openedDate || null,
      shelf_life_days: modalDraft.shelfLifeDays ? parseInt(modalDraft.shelfLifeDays, 10) : null,
      expiry_type: modalDraft.expiryType || 'caducitat',
    };
    const existingId = modalEditId;
    const moveId = moveFromExtraId;
    moveFromExtraId = null;

    if(!existingId && !moveId){
      const dup = DATA.items.find(x => x.category === fields.category && x.name.trim().toLowerCase() === fields.name.toLowerCase());
      if(dup){
        modalOpen = false;
        duplicateState = {existing: dup, incoming: fields};

  if(adminOverlay) adminOverlay.onclick = (e) => { if(e.target.id === 'adminOverlay'){ adminScreen = null; editingPersonId = null; adminColorDraft = null; render(); } };
  const adminCloseBtn = document.getElementById('adminCloseBtn');
  if(adminCloseBtn) adminCloseBtn.onclick = () => { adminScreen = null; editingPersonId = null; adminColorDraft = null; render(); };
  const exportBackupBtn = document.getElementById('exportBackupBtn');
  if(exportBackupBtn) exportBackupBtn.onclick = exportBackup;

  const addPersonBtn = document.getElementById('addPersonBtn');
  if(addPersonBtn) addPersonBtn.onclick = () => { addingPerson = true; render(); };
  const cancelAddPersonBtn = document.getElementById('cancelAddPersonBtn');
  if(cancelAddPersonBtn) cancelAddPersonBtn.onclick = () => { addingPerson = false; render(); };
  const addPersonForm = document.getElementById('addPersonForm');
  if(addPersonForm) addPersonForm.onsubmit = (e) => {
    e.preventDefault();
    addPerson(document.getElementById('newPersonName').value);
  };

  root.querySelectorAll('[data-editperson]').forEach(b => {
    b.onclick = () => {
      const id = b.dataset.editperson;
      if(editingPersonId === id){ editingPersonId = null; adminColorDraft = null; }
      else { editingPersonId = id; adminColorDraft = null; }
      render();
    };
  });
  root.querySelectorAll('[data-delperson]').forEach(b => {
    b.onclick = () => {
      if(DATA.people.length <= 1){ showToast('Ha de quedar almenys un perfil.'); return; }
      const p = DATA.people.find(x => x.id === b.dataset.delperson);
      askConfirm(`Eliminar el perfil "${p ? p.name : ''}"? Els articles i l'activitat que hi ha registrats es quedaran igual, només deixarà d'existir com a opció.`, () => deletePerson(b.dataset.delperson));
    };
  });
  root.querySelectorAll('[data-personname]').forEach(el => {
    el.addEventListener('change', (e) => renamePerson(el.dataset.personname, e.target.value));
  });
  root.querySelectorAll('[data-rmshortcut-admin]').forEach(b => {
    b.onclick = () => removeShortcut(b.dataset.rmshortcutAdmin);
  });

  root.querySelectorAll('[data-hue],[data-sat],[data-light]').forEach(el => {
    el.addEventListener('input', () => {
      if(!adminColorDraft) return;
      if(el.dataset.hue !== undefined) adminColorDraft.h = parseInt(el.value, 10);
      if(el.dataset.sat !== undefined) adminColorDraft.s = parseInt(el.value, 10);
      if(el.dataset.light !== undefined) adminColorDraft.l = parseInt(el.value, 10);
      updateSliderPreview();
    });
    el.addEventListener('change', () => commitPersonColor());
  });
}

function closeModal(){ modalOpen = false; modalDraft = null; modalEditId = null; moveFromExtraId = null; render(); }

function renderDuplicate(){
  const {existing, incoming} = duplicateState;
  return `
    <div class="overlay" id="duplicateOverlay">
      <div class="modal quick-modal" style="text-align:center;">
        <h3>Ja hi és</h3>
        <p style="font-size:14px;color:var(--ink);margin:4px 0 20px;line-height:1.45;">
          Ja tens <b>${esc(existing.name)}</b> a ${esc(existing.category)} (${existing.quantity}${esc(existing.unit||'')}).
          Vols sumar-hi ${incoming.quantity}${esc(incoming.unit||'')} més, o crear-ne un article separat?
        </p>
        <div style="display:flex;flex-direction:column;gap:8px;">
          <button type="button" class="btn-primary" id="mergeDuplicateBtn">Suma-ho a l'existent</button>
          <button type="button" class="side-action" id="createAnywayBtn" style="padding:8px;">Crea'n un altre igualment</button>
          <button type="button" class="btn-ghost" id="cancelDuplicateBtn">Cancel·la</button>
        </div>
      </div>
    </div>
  `;
}

function renderConfirm(){
  return `
    <div class="overlay" id="confirmOverlay">
      <div class="modal quick-modal" style="text-align:center;">
        <p style="font-size:14.5px;color:var(--ink);margin:4px 0 20px;line-height:1.4;">${esc(confirmState.message)}</p>
        <div class="modal-actions" style="justify-content:center;gap:14px;">
          <button type="button" class="btn-ghost" id="confirmCancelBtn">Cancel·la</button>
          <button type="button" class="btn-primary" id="confirmOkBtn" style="background:${confirmState.okColor};border-color:${confirmState.okColor};">${esc(confirmState.okLabel)}</button>
        </div>
      </div>
    </div>
  `;
}

function renderAdminPassword(){
  return `
    <div class="overlay" id="adminPassOverlay">
      <div class="modal quick-modal">
        <h3>Opcions avançades</h3>
        <form id="adminPassForm">
          <div class="field">
            <label>Contrasenya</label>
            <input type="password" id="adminPassInput" autocomplete="off" autofocus>
          </div>
          ${adminPassError ? `<p style="color:var(--brick);font-size:12px;margin:-6px 0 10px;">Contrasenya incorrecta.</p>` : ''}
          <div class="modal-actions">
            <button type="button" class="btn-ghost" id="adminPassCancelBtn">Cancel·la</button>
            <button type="submit" class="btn-primary">Entra</button>
          </div>
        </form>
      </div>
    </div>
  `;
}

function renderAdminPanel(){
  return `
    <div class="overlay" id="adminOverlay">
      <div class="modal" style="max-width:440px;">
        <h3>Opcions avançades</h3>
        <p class="admin-section-title">Perfils de casa</p>
        ${DATA.people.map(p => renderAdminPersonRow(p)).join('')}
        ${addingPerson ? `
          <form id="addPersonForm" class="admin-add-row">
            <input type="text" id="newPersonName" placeholder="Nom del nou perfil" autocomplete="off" autofocus>
            <button type="submit" class="btn-primary" style="padding:8px 14px;">Crea</button>
            <button type="button" class="btn-ghost" id="cancelAddPersonBtn">Cancel·la</button>
          </form>
        ` : `<button type="button" class="side-action" id="addPersonBtn" style="margin-top:8px;">+ Nou perfil</button>`}

        <p class="admin-section-title" style="margin-top:20px;">Dreceres de compra</p>
        <div class="shortcut-chips">
          ${DATA.shortcuts.map(s => `<span class="chip">${esc(s.name)}<button type="button" class="chip-x" data-rmshortcut-admin="${s.id}">✕</button></span>`).join('') || `<span class="side-empty">Cap encara.</span>`}
        </div>

        <p class="admin-section-title" style="margin-top:20px;">Dades</p>
        <button type="button" class="side-action" id="exportBackupBtn">Exporta còpia de seguretat (JSON)</button>

        <div class="modal-actions" style="margin-top:22px;">
          <button type="button" class="btn-ghost" id="adminCloseBtn">Tanca</button>
          <span></span>
        </div>
      </div>
    </div>
  `;
}

function renderAdminPersonRow(p){
  const isEditing = editingPersonId === p.id;
  return `
    <div class="admin-person-row">
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="dot" style="background:${p.color};width:16px;height:16px;"></span>
        ${isEditing
          ? `<input type="text" class="admin-name-input" data-personname="${p.id}" value="${esc(p.name)}">`
          : `<span style="flex:1;font-size:14px;">${esc(p.name)}</span>`}
        <button type="button" class="side-action" data-editperson="${p.id}">${isEditing ? 'fet' : 'edita'}</button>
        <button type="button" class="side-action" data-delperson="${p.id}" style="color:var(--brick);">elimina</button>
      </div>
      ${isEditing ? renderColorSliders(p) : ''}
    </div>
  `;
}

function renderColorSliders(p){
  const d = adminColorDraft && adminColorDraft.personId === p.id ? adminColorDraft : {personId: p.id, ...hexToHsl(p.color)};
  adminColorDraft = d;
  return `
    <div class="slider-panel">
      <div class="slider-row">
        <label>To</label>
        <input type="range" min="0" max="360" value="${d.h}" data-hue="${p.id}" class="slider slider-hue">
      </div>
      <div class="slider-row">
        <label>Saturació</label>
        <input type="range" min="0" max="100" value="${d.s}" data-sat="${p.id}" class="slider">
      </div>
      <div class="slider-row">
        <label>Lluminositat</label>
        <input type="range" min="10" max="85" value="${d.l}" data-light="${p.id}" class="slider">
      </div>
      <div style="display:flex;align-items:center;gap:10px;margin-top:8px;">
        <span id="sliderSwatch" style="width:28px;height:28px;border-radius:50%;background:${p.color};border:1px solid var(--line);"></span>
        <span id="sliderHex" style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--ink-soft);">${p.color.toUpperCase()}</span>
      </div>
    </div>
  `;
}

function renderPicker(){
  root.innerHTML = `
    <div class="picker">
      <div class="picker-card">
        <p class="eyebrow">Rebost</p>
        <h1 class="h-title">Qui ets?</h1>
        <p class="picker-sub">Perquè sapiguem qui ha tocat què.</p>
        <div class="picker-list">
          ${DATA.people.map(p => `
            <button data-pick="${esc(p.name)}">
              <span class="dot" style="background:${p.color}"></span>${esc(p.name)}
            </button>`).join('')}
        </div>
      </div>
    </div>
  `;
  root.querySelectorAll('[data-pick]').forEach(b => {
    b.onclick = () => setPerson(b.dataset.pick);
  });
}

init();

if('serviceWorker' in navigator){
  window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(()=>{}); });
  let swRefreshed = false;
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if(swRefreshed) return;
    swRefreshed = true;
    window.location.reload();
  });
}

</script>
</body>
</html>
